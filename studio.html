<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Юрчик Cinema — SVG Анимация</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #000; /* Глубокий черный для кино */
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header { padding: 20px; text-align: center; color: #ff3b30; }
        
        #video-canvas {
            width: 90%;
            max-width: 500px;
            aspect-ratio: 1/1;
            background: #1c1c1e;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(255, 59, 48, 0.2);
            overflow: hidden;
            margin-bottom: 20px;
        }

        svg { width: 100%; height: 100%; }

        .controls {
            width: 90%;
            max-width: 500px;
            display: flex;
            gap: 10px;
            padding-bottom: 40px;
        }

        input {
            flex-grow: 1;
            background: #2c2c2e;
            border: none;
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            font-size: 16px;
        }

        button {
            background: #ff3b30;
            border: none;
            color: white;
            padding: 0 25px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .loader {
            display: none;
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #ff3b30;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>Юрчик Cinema 🎬</h1>
    <p>Оживи свои идеи через SVG-анимацию</p>
</header>

<div id="video-canvas">
    <div id="loader" class="loader"></div>
    <div id="placeholder" style="color: #444;">Введите сценарий для анимации...</div>
</div>

<div class="controls">
    <input type="text" id="script-input" placeholder="Напр: прыгающий мяч или вращающаяся галактика">
    <button id="render-btn" onclick="renderVideo()">Снять!</button>
</div>

<script>
    async function renderVideo() {
        const input = document.getElementById('script-input');
        const btn = document.getElementById('render-btn');
        const canvas = document.getElementById('video-canvas');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholder');

        if (!input.value.trim()) return;

        btn.disabled = true;
        loader.style.display = 'block';
        placeholder.style.display = 'none';
        
        // Очищаем старое видео
        const oldSvg = canvas.querySelector('svg');
        if (oldSvg) oldSvg.remove();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { 
                            role: "system", 
                            content: `Ты — мастер анимации SVG (SMIL). 
                            Генерируй ТОЛЬКО код <svg> с использованием тегов <animate>, <animateTransform> или <animateMotion>.
                            Сделай анимацию зацикленной (repeatCount="indefinite").
                            Никакого текста, только код в блоке \`\`\`svg.
                            viewBox="0 0 100 100".` 
                        },
                        { role: "user", content: "Создай анимацию: " + input.value }
                    ]
                })
            });

            const data = await response.json();
            const text = data.choices[0].message.content;
            const svgMatch = text.match(/```svg([\s\S]*?)```/);

            if (svgMatch && svgMatch[1]) {
                canvas.innerHTML = svgMatch[1].trim();
                // Возвращаем скрытый лоадер для следующего раза
                canvas.insertAdjacentHTML('beforeend', '<div id="loader" class="loader" style="display:none;"></div>');
            } else {
                alert("Режиссер уснул. Попробуй еще раз.");
                placeholder.style.display = 'block';
            }
        } catch (e) {
            alert("Ошибка связи со студией");
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
