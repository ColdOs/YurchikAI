<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TFJS Sentiment AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f4f9; padding: 40px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 5px; width: 250px; }
        button { padding: 12px 20px; border: none; border-radius: 5px; background: #4CAF50; color: white; cursor: pointer; }
        #status { margin-top: 15px; color: #666; font-style: italic; }
    </style>
</head>
<body>
    <div class="card">
        <h2>TensorFlow.js Анализатор</h2>
        <input type="text" id="userInput" placeholder="Как дела?">
        <button onclick="predict()">Анализ</button>
        <div id="status">Загрузка TensorFlow...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="app.js"></script>
</body>
</html>
