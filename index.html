<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD3 Ultra Wide Links</title>
    <style>
        :root {
            --color-blue: #0043ef;
            --color-red: #ff0000;
            --color-white: #ffffff;
            --color-yellow: #ffea00;
            --font-main: "Arial Black", Gadget, sans-serif;
            --transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: #000;
            height: 100vh;
            padding: 15px;
            display: flex;
            overflow: hidden;
        }

        .grid-container {
            display: grid;
            width: 100%;
            height: 100%;
            gap: 15px;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: 1fr 1fr;
        }

        /* Плитка теперь тег <a> */
        .tile {
            position: relative;
            border-radius: 40px;
            padding: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            cursor: pointer;
            transition: var(--transition);
            /* Убираем оформление ссылки */
            text-decoration: none; 
            border: none;
            outline: none;
        }

        .tile:hover {
            transform: scale(0.98);
            filter: brightness(1.1);
        }

        .tile-row-1 { grid-column: span 3; }
        .tile-row-2 { grid-column: span 2; }

        /* Цвета и принудительный цвет текста для ссылок */
        .blue { background-color: var(--color-blue); color: #fff; }
        .red { background-color: var(--color-red); color: #fff; }
        .white { background-color: var(--color-white); color: #000; }
        .yellow { background-color: var(--color-yellow); color: #000; }

        .rainbow {
            animation: rainbow-bg 8s infinite linear;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        @keyframes rainbow-bg {
            0%   { background-color: #ff0000; }
            20%  { background-color: #ffff00; }
            40%  { background-color: #00ff00; }
            60%  { background-color: #00ffff; }
            80%  { background-color: #0000ff; }
            100% { background-color: #ff0000; }
        }

        .beta-badge {
            position: absolute;
            top: 30px;
            right: 130px;
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            transform: rotate(-10deg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 5;
        }

        .title {
            font-size: 5rem;
            line-height: 0.9;
            font-weight: 900;
            text-transform: uppercase;
            z-index: 10;
        }

        .description {
            font-size: 1.8rem;
            margin-top: 15px;
            opacity: 0;
            transform: translateY(-40px);
            transition: var(--transition);
            z-index: 5;
        }

        .tile:hover .description {
            opacity: 1;
            transform: translateY(0);
        }

        .icon {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 6rem;
            opacity: 0;
            transform: translate(100px, -100px);
            transition: var(--transition);
        }

        .tile:hover .icon {
            opacity: 1;
            transform: translate(0, 0);
        }

        @media (max-width: 900px) {
            .title { font-size: 3rem; }
            .grid-container { grid-template-columns: 1fr; grid-template-rows: repeat(5, 1fr); }
            .tile-row-1, .tile-row-2 { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <a href="chat.html" class="tile tile-row-1 blue">
            <div class="title">ЧАТ</div>
            <div class="description">текстовая переписка с ИИ</div>
            <div class="icon">💬</div>
        </a>

        <a href="generator.html" class="tile tile-row-1 rainbow">
            <div class="title">КАРТИНКИ</div>
            <div class="description">генерация изображений с ИИ</div>
            <div class="icon">🎨</div>
        </a>

        <a href="#red" class="tile tile-row-2 red">
            <div class="title">СТУДИЯ</div>
            <div class="description">генерация анимаций с ИИ</div>
            <div class="icon">🎬</div>
        </a>

        <a href="#beta" class="tile tile-row-2 white">
            <div class="beta-badge">BETA</div>
            <div class="title">CLOUD</div>
            <div class="description">разработка программ с ИИ</div>
            <div class="icon">💾</div>
        </a>

        <a href="#yellow" class="tile tile-row-2 yellow">
            <div class="title">ИНФОРМАЦИЯ</div>
            <div class="description">о Yurchik AI</div>
            <div class="icon">ℹ️</div>
        </a>
    </div>

</body>
</html>
