<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD3 Ultra Wide Offline</title>
    <style>
        :root {
            --color-blue: #0043ef;
            --color-red: #ff0000;
            --color-white: #ffffff;
            --color-yellow: #ffea00;
            /* Самый широкий и жирный шрифт из доступных в системе */
            --font-main: "Arial Black", Gadget, sans-serif;
            --transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: #000;
            height: 100vh;
            padding: 15px;
            display: flex;
            overflow: hidden;
        }

        .grid-container {
            display: grid;
            width: 100%;
            height: 100%;
            gap: 15px;
            /* Сетка на 6 частей для кратности 2 и 3 */
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: 1fr 1fr;
        }

        .tile {
            position: relative;
            border-radius: 40px; /* MD3 Style */
            padding: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            cursor: pointer;
            transition: var(--transition);
        }

        /* Масштабирование при наведении */
        .tile:hover {
            transform: scale(0.99);
        }

        /* Сетка: 2 сверху, 3 снизу */
        .tile-row-1 { grid-column: span 3; }
        .tile-row-2 { grid-column: span 2; }

        /* Цвета */
        .blue { background-color: var(--color-blue); color: #fff; }
        .red { background-color: var(--color-red); color: #fff; }
        .white { background-color: var(--color-white); color: #000; }
        .yellow { background-color: var(--color-yellow); color: #000; }

        /* Радужная плитка: переливается одним цветом целиком */
        .rainbow {
            animation: rainbow-bg 8s infinite linear;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        @keyframes rainbow-bg {
            0%   { background-color: #ff0000; }
            20%  { background-color: #ffff00; }
            40%  { background-color: #00ff00; }
            60%  { background-color: #00ffff; }
            80%  { background-color: #0000ff; }
            100% { background-color: #ff0000; }
        }

        /* Эмблема BETA */
        .beta-badge {
            position: absolute;
            top: 30px;
            right: 120px; /* Чтобы не мешала иконке */
            background: #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            transform: rotate(-10deg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 5;
        }

        /* Заголовок (в 3 раза больше обычного) */
        .title {
            font-size: 5rem;
            line-height: 0.9;
            font-weight: 900;
            text-transform: uppercase;
            z-index: 10;
        }

        /* Описание вылетает из-под заголовка */
        .description {
            font-size: 1.8rem;
            margin-top: 15px;
            opacity: 0;
            transform: translateY(-40px);
            transition: var(--transition);
            z-index: 5;
        }

        .tile:hover .description {
            opacity: 1;
            transform: translateY(0);
        }

        /* Иконка-эмодзи вылетает из правого верхнего угла */
        .icon {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 6rem;
            opacity: 0;
            transform: translate(100px, -100px);
            transition: var(--transition);
        }

        .tile:hover .icon {
            opacity: 1;
            transform: translate(0, 0);
        }

        /* Адаптив для малых экранов */
        @media (max-width: 900px) {
            .title { font-size: 3rem; }
            .grid-container { grid-template-columns: 1fr; grid-template-rows: repeat(5, 1fr); }
            .tile-row-1, .tile-row-2 { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <a href="https://google.com" class="tile tile-row-1 blue">
            <div class="title">СИНЯЯ</div>
            <div class="description">ШИРОКИЙ ШРИФТ И ЧИСТЫЙ КОД</div>
            <div class="icon">💧</div>
        </a>

        <div class="tile tile-row-1 rainbow">
            <div class="title">РАДУГА</div>
            <div class="description">ЦВЕТ МЕНЯЕТСЯ ЦЕЛИКОМ</div>
            <div class="icon">🌈</div>
        </div>

        <div class="tile tile-row-2 red">
            <div class="title">КРАСНАЯ</div>
            <div class="description">ВЫЛЕТ ИЗ-ПОД ЗАГОЛОВКА</div>
            <div class="icon">🔥</div>
        </div>

        <div class="tile tile-row-2 white">
            <div class="beta-badge">BETA</div>
            <div class="title">БЕЛАЯ</div>
            <div class="description">С КРАСНОЙ ЭМБЛЕМОЙ ТЕСТА</div>
            <div class="icon">🧊</div>
        </div>

        <div class="tile tile-row-2 yellow">
            <div class="title">ЖЕЛТАЯ</div>
            <div class="description">МАКСИМАЛЬНАЯ ЯРКОСТЬ</div>
            <div class="icon">⚡</div>
        </div>
    </div>

</body>
</html>
