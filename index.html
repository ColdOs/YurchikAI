<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Brain.js AI Prototype</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        input { padding: 10px; width: 300px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Нейросеть: Анализ настроения</h2>
    <input type="text" id="userInput" placeholder="Введите фразу на русском...">
    <button onclick="predict()">Анализировать</button>
    <div id="result">Обучение...</div>

    <script src="https://unpkg.com/brain.js"></script>
    <script src="app.js"></script>
</body>
</html>
