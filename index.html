<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material MD3 Offline Tiles</title>
    <style>
        :root {
            /* Цвета MD3 Saturated */
            --color-blue: #0043ef;
            --color-red: #ff0000;
            --color-white: #ffffff;
            --color-yellow: #ffea00;
            /* Самый жирный и широкий системный шрифт */
            --font-wide: "Arial Black", "Arial Bold", Gadget, sans-serif;
            --transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-wide);
            background-color: #121212;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
            display: flex;
        }

        .grid-container {
            display: grid;
            width: 100%;
            height: 100%;
            gap: 20px;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: 1fr 1fr;
        }

        /* Общие стили плиток */
        .tile {
            position: relative;
            border-radius: 40px;
            padding: 40px;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
        }

        .tile:hover {
            transform: scale(0.98);
        }

        /* Сетка: 2 в первом ряду, 3 во втором */
        .tile-2 { grid-column: span 3; }
        .tile-3 { grid-column: span 2; }

        /* Окраска */
        .blue { background-color: var(--color-blue); color: white; }
        .red { background-color: var(--color-red); color: white; }
        .white { background-color: var(--color-white); color: black; }
        .yellow { background-color: var(--color-yellow); color: black; }
        
        .rainbow { 
            /* Насыщенная радуга на 2/3 экрана */
            background: linear-gradient(90deg, 
                #ff0000, #ff00ff, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000);
            background-size: 150% 100%;
            animation: rainbow-move 4s linear infinite;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        @keyframes rainbow-move {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Заголовок (в 3 раза больше) */
        .title {
            font-size: 4.5rem; /* Примерно в 3 раза больше стандарта */
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            z-index: 10;
        }

        /* Иконка в правом верхнем углу */
        .icon-box {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            opacity: 0;
            transform: translate(100px, -100px); /* Вылетает из угла */
            transition: var(--transition);
        }

        .tile:hover .icon-box {
            opacity: 1;
            transform: translate(0, 0);
        }

        .icon-box svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        /* Описание, вылетающее из-под заголовка */
        .description {
            font-size: 1.5rem;
            margin-top: 20px;
            max-width: 80%;
            opacity: 0;
            transform: translateY(-50px); /* Спрятано "под" заголовком */
            transition: var(--transition);
            transition-delay: 0.1s;
        }

        .tile:hover .description {
            opacity: 1;
            transform: translateY(0);
        }

        /* Адаптив для планшетов */
        @media (max-width: 1024px) {
            .title { font-size: 3rem; }
            .grid-container { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
            .tile-2, .tile-3 { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="tile tile-2 blue">
            <div class="title">СИНЯЯ</div>
            <div class="icon-box">
                <svg viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
            </div>
            <div class="description">МАССИВНЫЙ ТЕКСТ И ПОЛНЫЙ ОФЛАЙН</div>
        </div>

        <div class="tile tile-2 rainbow">
            <div class="title">РАДУГА</div>
            <div class="icon-box">
                <svg viewBox="0 0 24 24"><path d="M12,22C6.47,22 2,17.53 2,12C2,6.47 6.47,2 12,2C17.53,2 22,6.47 22,12C22,17.53 17.53,22 12,22M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M12,16.5A4.5,4.5 0 0,1 7.5,12A4.5,4.5 0 0,1 12,7.5A4.5,4.5 0 0,1 16.5,12A4.5,4.5 0 0,1 12,16.5Z"/></svg>
            </div>
            <div class="description">2/3 СПЕКТРА И ВЫСОКАЯ НАСЫЩЕННОСТЬ</div>
        </div>

        <div class="tile tile-3 red">
            <div class="title">КРАСНАЯ</div>
            <div class="icon-box">
                <svg viewBox="0 0 24 24"><path d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"/></svg>
            </div>
            <div class="description">ЭНЕРГИЧНЫЙ ЦВЕТ И ПЛАВНЫЙ ВЫЛЕТ</div>
        </div>

        <div class="tile tile-3 white">
            <div class="title">БЕЛАЯ</div>
            <div class="icon-box">
                <svg viewBox="0 0 24 24"><path d="M12,3L1,9L12,15L21,10.09V17H23V9M5,13.18V17.18L12,21L19,17.18V13.18L12,17L5,13.18Z"/></svg>
            </div>
            <div class="description">МИНИМАЛИЗМ И ЖИРНЫЙ ШРИФТ</div>
        </div>

        <div class="tile tile-3 yellow">
            <div class="title">ЖЕЛТАЯ</div>
            <div class="icon-box">
                <svg viewBox="0 0 24 24"><path d="M12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,7A5,5 0 0,0 7,12A5,5 0 0,0 12,17A5,5 0 0,0 17,12A5,5 0 0,0 12,7Z"/></svg>
            </div>
            <div class="description">ЯРКИЙ АКЦЕНТ В ЛЮБОЕ ВРЕМЯ</div>
        </div>
    </div>

</body>
</html>
