<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yurchik Cloud — App Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #09090b;
            color: #fafafa;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            padding: 15px 20px;
            background: #18181b;
            border-bottom: 1px solid #27272a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding: 20px;
            gap: 20px;
        }
        #app-viewport {
            flex-grow: 1;
            background: #fff; /* Белый фон для превью приложений */
            border-radius: 12px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .input-zone {
            display: flex;
            gap: 10px;
            background: #18181b;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #27272a;
        }
        input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #2563eb; }
        button:disabled { background: #3f3f46; cursor: not-allowed; }

        /* Лоадер */
        #loader {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #3b82f6;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 20px;">☁️ Yurchik Cloud</div>
    <div id="status" style="font-size: 12px; color: #71717a;">Готов к деплою</div>
</header>

<div class="container">
    <div id="loader"><div class="spinner"></div></div>
    <iframe id="app-viewport" title="App Preview"></iframe>

    <div class="input-zone">
        <input type="text" id="app-prompt" placeholder="Напиши: Синтезатор на JS или Игра Змейка...">
        <button id="deploy-btn" onclick="deployApp()">Запустить</button>
    </div>
</div>

<script>
    async function deployApp() {
    const input = document.getElementById('app-prompt');
    const btn = document.getElementById('deploy-btn');
    const viewport = document.getElementById('app-viewport');
    const status = document.getElementById('status');

    // --- ЛОГИКА ЛИМИТА ---
    const LIMIT_KEY = 'yurchik_cloud_limit';
    const MAX_APPS = 10;
    
    let today = new Date().toLocaleDateString(); // Получаем текущую дату (напр. "24.05.2024")
    let usage = JSON.parse(localStorage.getItem(LIMIT_KEY)) || { date: today, count: 0 };

    // Если наступил новый день, сбрасываем счетчик
    if (usage.date !== today) {
        usage = { date: today, count: 0 };
    }

    // Проверяем, не исчерпан ли лимит
    if (usage.count >= MAX_APPS) {
        status.innerHTML = `<b style="color: #ff3b30;">Лимит исчерпан!</b> (10/10 на сегодня). Приходи завтра.`;
        alert("На сегодня хватит! GPT 120b дорогой, лимит 10 программ в сутки.");
        return;
    }
    // ---------------------

    const prompt = input.value.trim();
    if (!prompt) return;

    btn.disabled = true;
    status.innerText = `Запуск системы... (Использовано: ${usage.count + 1} из ${MAX_APPS})`;

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: "openai/gpt-oss-120b", // или твой прокси для 120b
                messages: [
                    { 
                        role: "system", 
                        content: "Ты — Senior Fullstack Developer. Пиши только чистый HTML/JS/CSS код в блоке ```html." 
                    },
                    { role: "user", content: prompt }
                ]
            })
        });

        const data = await response.json();
        const text = data.choices[0].message.content;
        const htmlMatch = text.match(/```html([\s\S]*?)```/);

        if (htmlMatch && htmlMatch[1]) {
            // Если деплой успешен — засчитываем попытку
            usage.count++;
            localStorage.setItem(LIMIT_KEY, JSON.stringify(usage));
            
            const blob = new Blob([htmlMatch[1].trim()], { type: 'text/html' });
            viewport.src = URL.createObjectURL(blob);
            status.innerText = `Приложение #${usage.count} развернуто успешно!`;
        }
    } catch (e) {
        status.innerText = 'Ошибка терминала';
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
