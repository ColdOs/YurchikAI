<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Юрчик Art — SVG Генератор</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center;
        }

        header {
            padding: 20px;
            text-align: center;
        }

        #result-container {
            flex-grow: 1;
            width: 90%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2c2c2e;
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #3a3a3c;
            position: relative;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 80%;
        }

        .controls {
            width: 90%;
            max-width: 500px;
            padding-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 12px;
            padding: 15px;
            color: white;
            outline: none;
        }

        button {
            background: #007aff;
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled {
            background: #444;
        }

        /* Лоадер */
        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007aff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>Юрчик Art 🎨</h1>
    <p>Пиши, что нарисовать (SVG)</p>
</header>

<div id="result-container">
    <div id="loader" class="loader"></div>
    <div id="svg-placeholder" style="color: #666;">Тут появится твой шедевр</div>
</div>

<div class="controls">
    <input type="text" id="prompt-input" placeholder="Нарисуй ракету на луне...">
    <button id="gen-btn" onclick="generateArt()">Создать</button>
</div>

<script>
    async function generateArt() {
    const input = document.getElementById('prompt-input');
    const btn = document.getElementById('gen-btn');
    const container = document.getElementById('result-container');
    const loader = document.getElementById('loader');

    const prompt = input.value.trim();
    if (!prompt) return;

    // 1. ОЧИСТКА ПЕРЕД ЗАПУСКОМ
    // Удаляем старый SVG, чтобы он не мешал новому
    const oldSvg = container.querySelector('svg');
    if (oldSvg) oldSvg.remove();
    
    const placeholder = document.getElementById('svg-placeholder');
    if (placeholder) placeholder.style.display = 'none';

    // Состояние загрузки
    btn.disabled = true;
    loader.style.display = 'block';

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    { 
                        role: "system", 
                        content: "Ты — SVG дизайнер. Генерируй ТОЛЬКО код SVG в блоке ```svg. Без текста!" 
                    },
                    { role: "user", content: prompt }
                ]
            })
        });

        const data = await response.json();
        const text = data.choices[0].message.content;

        // 2. ВСТАВКА НОВОГО РИСУНКА
        const svgMatch = text.match(/```svg([\s\S]*?)```/);
        if (svgMatch && svgMatch[1]) {
            // Очищаем лоадер и вставляем свежий код
            loader.style.display = 'none';
            container.innerHTML = svgMatch[1].trim(); 
            // Добавляем лоадер обратно (скрытым), чтобы он был готов к следующему разу
            container.insertAdjacentHTML('beforeend', '<div id="loader" class="loader" style="display:none;"></div>');
        } else {
            alert("ИИ выдал странный ответ. Попробуй еще раз!");
            if (placeholder) placeholder.style.display = 'block';
        }
    } catch (error) {
        console.error(error);
        alert("Ошибка сети");
    } finally {
        loader.style.display = 'none';
        btn.disabled = false;
    }
}
</script>

</body>
</html>
